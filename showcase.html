<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/main.css?v=1" />
    <link rel="stylesheet" href="showcase.css?v=2" />
    <title>Becky Cole | Showcase</title>
  </head>

  <body class="showcase-body">
    <header>
      <nav id="navbar" class="topnav">
        <img
          src="assets/BeckyUnicorn.png"
          class="nav-logo"
          alt="girl in bubble logo"
        />

        <div class="nav-links">
          <a class="nav-link" href="index.html">Home</a>
          <a class="nav-link" href="about.html">About</a>
          <a class="nav-link" href="projects.html">Projects</a>
          <a class="nav-link" href="case-studies.html">Case Studies</a>
          <a class="nav-link" href="showcase.html">Showcase</a>
          <a class="nav-link" href="contact.html">Contact</a>
        </div>

        <button
          class="hamburger-btn"
          id="menu-toggle"
          aria-label="Open menu"
          aria-expanded="false"
        >
          <img
            src="assets/hamburger.svg"
            class="hamburger-icon"
            alt="three horizontal lines stacked on top of each other"
          />
        </button>
      </nav>
    </header>

    <main class="showcase-screen">
      <div class="showcase-stars" aria-hidden="true"></div>

      <section class="showcase-layout">
        <section
          class="showcase-carousel"
          id="showcaseCarousel"
          aria-label="Rebecca Cole showcase carousel"
          tabindex="0"
        >
          <div class="showcase-carousel__bg-stack" id="carouselBg"></div>
          <div class="showcase-carousel__overlay" aria-hidden="true"></div>
          <div class="showcase-carousel__tone" aria-hidden="true"></div>
          <div
            class="showcase-carousel__fade"
            id="carouselFade"
            aria-hidden="true"
          ></div>

          <div class="showcase-carousel__inner">
            <div class="showcase-carousel__content">
              <p class="showcase-carousel__eyebrow" id="slideEyebrow"></p>
              <img
                id="slideLogo"
                class="showcase-carousel__logo"
                alt=""
                hidden
              />
              <h1 class="showcase-carousel__title" id="slideTitle"></h1>
              <p class="showcase-carousel__subtitle" id="slideSubtitle"></p>
              <ul class="showcase-carousel__bullets" id="slideBullets"></ul>

              <div class="showcase-carousel__actions">
                <a
                  class="showcase-btn showcase-btn--primary"
                  id="slidePrimary"
                  href="case-studies.html"
                >
                  View case study
                </a>
                <a
                  class="showcase-btn showcase-btn--secondary"
                  id="slideSecondary"
                  href="projects.html"
                >
                  View projects
                </a>
              </div>

              <div class="showcase-carousel__nav">
                <div class="showcase-carousel__arrow-group">
                  <button
                    type="button"
                    class="showcase-carousel__arrow"
                    id="prevBtn"
                    aria-label="Previous slide"
                  >
                    ‹
                  </button>
                  <button
                    type="button"
                    class="showcase-carousel__arrow"
                    id="nextBtn"
                    aria-label="Next slide"
                  >
                    ›
                  </button>
                </div>

                <div
                  class="showcase-carousel__dots"
                  id="carouselDots"
                  aria-label="Select slide"
                ></div>
              </div>
            </div>

            <div class="showcase-carousel__visual" id="slideVisualWrap">
              <div class="showcase-carousel__visual-frame">
                <img
                  id="slideVisualImage"
                  class="showcase-carousel__visual-image"
                  src=""
                  alt=""
                />
              </div>
            </div>
          </div>

          <div
            class="showcase-carousel__intro-wave"
            id="introWave"
            aria-hidden="true"
            hidden
          >
            <img src="assets/ocean-blue.png" alt="" />
          </div>

          <div
            class="showcase-carousel__intro-visual"
            id="introVisual"
            aria-hidden="true"
            hidden
          >
            <img src="assets/BeckyUnicornTransparent.png" alt="" />
          </div>
        </section>

        <aside class="showcase-qr" aria-label="Portfolio QR code">
          <div class="showcase-qr__code">
            <img
              src="assets/showcase/portfolio-qr.png"
              alt="QR code linking to Rebecca Cole portfolio"
            />
          </div>
          <div class="showcase-qr__url">rebecca-de-winter.github.io</div>
        </aside>
      </section>
    </main>

    <script src="script.js" defer></script>
    <script src="showcase.js" defer></script>
  </body>
</html>
